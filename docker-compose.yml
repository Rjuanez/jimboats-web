name: jimboats-web-dev

services:
  app:
    build:
      context: .
      target: base
    command: sh -lc "CI=true pnpm install --frozen-lockfile --store-dir /pnpm/store && pnpm db:generate && pnpm dev --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimboats}:${POSTGRES_PASSWORD:-jimboats}@db:5432/${POSTGRES_DB:-jimboats}?schema=public
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - pnpm_store:/pnpm/store
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jimboats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jimboats}
      POSTGRES_DB: ${POSTGRES_DB:-jimboats}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  next_cache:
  node_modules:
  pnpm_store:
  postgres_data:
