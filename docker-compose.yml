name: jimboats-web-dev

services:
  app:
    build:
      context: .
      target: base
    command: sh -lc "CI=true pnpm install --frozen-lockfile --store-dir /pnpm/store && pnpm db:generate && pnpm dev --webpack --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimboats}:${POSTGRES_PASSWORD:-jimboats}@db:5432/${POSTGRES_DB:-jimboats}?schema=public
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      HOSTNAME: 0.0.0.0
      MEDIA_PUBLIC_BASE_URL: /media
      MEDIA_ROOT: /var/lib/jimboats/media
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      NODE_ENV: development
      NOTIFICATION_PROVIDER_MODE: ${NOTIFICATION_PROVIDER_MODE:-console}
      PRELUDE_API_KEY: ${PRELUDE_API_KEY:-}
      PRELUDE_BASE_URL: ${PRELUDE_BASE_URL:-}
      PRELUDE_CALLBACK_URL: ${PRELUDE_CALLBACK_URL:-}
      PRELUDE_FROM: ${PRELUDE_FROM:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      PORT: "3000"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_BASE_URL: ${RESEND_BASE_URL:-}
      RESEND_FROM: ${RESEND_FROM:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    expose:
      - "3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - pnpm_store:/pnpm/store
      - media_data:/var/lib/jimboats/media
    depends_on:
      db:
        condition: service_healthy

  media-worker:
    build:
      context: .
      target: base
    command: sh -lc "if [ ! -x node_modules/.bin/esbuild ]; then CI=true pnpm install --frozen-lockfile --store-dir /pnpm/store; fi && pnpm db:generate && pnpm media:worker"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimboats}:${POSTGRES_PASSWORD:-jimboats}@db:5432/${POSTGRES_DB:-jimboats}?schema=public
      MEDIA_PUBLIC_BASE_URL: /media
      MEDIA_ROOT: /var/lib/jimboats/media
      MEDIA_WORKER_POLL_INTERVAL_MS: ${MEDIA_WORKER_POLL_INTERVAL_MS:-2000}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - media_data:/var/lib/jimboats/media
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  home-gallery-worker:
    build:
      context: .
      target: base
    command: sh -lc "if [ ! -x node_modules/.bin/esbuild ]; then CI=true pnpm install --frozen-lockfile --store-dir /pnpm/store; fi && pnpm db:generate && pnpm home-gallery:worker"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimboats}:${POSTGRES_PASSWORD:-jimboats}@db:5432/${POSTGRES_DB:-jimboats}?schema=public
      HOME_GALLERY_WORKER_INTERVAL_MS: ${HOME_GALLERY_WORKER_INTERVAL_MS:-300000}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  booking-calendar-sync-worker:
    build:
      context: .
      target: base
    command: sh -lc "if [ ! -x node_modules/.bin/esbuild ]; then CI=true pnpm install --frozen-lockfile --store-dir /pnpm/store; fi && pnpm booking-calendar-sync:worker"
    environment:
      BOOKING_CALENDAR_SYNC_INTERVAL_MS: ${BOOKING_CALENDAR_SYNC_INTERVAL_MS:-3600000}
      BOOKING_CALENDAR_SYNC_LIMIT: ${BOOKING_CALENDAR_SYNC_LIMIT:-100}
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimboats}:${POSTGRES_PASSWORD:-jimboats}@db:5432/${POSTGRES_DB:-jimboats}?schema=public
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  notification-worker:
    build:
      context: .
      target: base
    command: sh -lc "if [ ! -x node_modules/.bin/esbuild ]; then CI=true pnpm install --frozen-lockfile --store-dir /pnpm/store; fi && pnpm db:generate && pnpm notifications:worker"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimboats}:${POSTGRES_PASSWORD:-jimboats}@db:5432/${POSTGRES_DB:-jimboats}?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
      NOTIFICATION_PROVIDER_MODE: ${NOTIFICATION_PROVIDER_MODE:-console}
      NOTIFICATION_WORKER_POLL_INTERVAL_MS: ${NOTIFICATION_WORKER_POLL_INTERVAL_MS:-2000}
      PRELUDE_API_KEY: ${PRELUDE_API_KEY:-}
      PRELUDE_BASE_URL: ${PRELUDE_BASE_URL:-}
      PRELUDE_CALLBACK_URL: ${PRELUDE_CALLBACK_URL:-}
      PRELUDE_FROM: ${PRELUDE_FROM:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_BASE_URL: ${RESEND_BASE_URL:-}
      RESEND_FROM: ${RESEND_FROM:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./infra/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - media_data:/var/lib/jimboats/media:ro
    depends_on:
      app:
        condition: service_started

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jimboats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jimboats}
      POSTGRES_DB: ${POSTGRES_DB:-jimboats}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  next_cache:
  media_data:
  node_modules:
  pnpm_store:
  postgres_data:
