name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare static media
        run: pnpm media:prepare

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and component tests
        run: pnpm test

      - name: UI tests
        run: pnpm test:ui

      - name: Build Next.js
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Responsive checks
        run: pnpm test:responsive

      - name: Accessibility checks
        run: pnpm test:a11y

      - name: Visual checks
        run: pnpm test:visual

  publish-and-deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image repository
        id: image
        run: echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
            ${{ steps.image.outputs.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload infra files
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          VPS_APP_DIR="${VPS_APP_DIR:-/srv/jimboats/web}"
          VPS_PORT="${VPS_PORT:-22}"
          ssh -v -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "echo ssh-ok && mkdir -p '$VPS_APP_DIR'"
          tar -czf - infra | ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR' && tar -xzf - -C '$VPS_APP_DIR'"
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "chmod +x '$VPS_APP_DIR'/infra/deploy/*.sh"

      - name: Deploy on VPS
        env:
          GHCR_TOKEN: ${{ github.token }}
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ github.sha }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          VPS_APP_DIR="${VPS_APP_DIR:-/srv/jimboats/web}"
          VPS_PORT="${VPS_PORT:-22}"
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "APP_DIR='$VPS_APP_DIR' IMAGE_REPOSITORY='$IMAGE_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' GHCR_USERNAME='${{ github.actor }}' GHCR_TOKEN='$GHCR_TOKEN' sh '$VPS_APP_DIR/infra/deploy/deploy.sh'"
